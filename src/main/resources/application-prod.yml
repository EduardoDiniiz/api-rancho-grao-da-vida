spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    # db/migration = schema; db/seed-prod = admin inicial (só existe em prod)
    locations: classpath:db/migration,classpath:db/seed-prod

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.rancho.api: INFO
