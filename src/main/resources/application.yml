spring:
  application:
    name: rancho-gestao-api
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api

api:
  security:
    jwt:
      token-prefix: "Bearer "
      header: "Authorization"
