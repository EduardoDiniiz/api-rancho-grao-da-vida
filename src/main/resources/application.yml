spring:
  application:
    name: rancho-gestao-api
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api

api:
  security:
    jwt:
      token-prefix: "Bearer "
      header: "Authorization"

# Integracao com interruptores WiFi via Tuya Cloud (menu Dispositivos).
# Preencha via variaveis de ambiente. Enquanto enabled=false o menu mostra apenas o aviso de configuracao.
tuya:
  enabled: ${TUYA_ENABLED:false}
  endpoint: ${TUYA_ENDPOINT:https://openapi.tuyaus.com}
  access-id: ${TUYA_ACCESS_ID:}
  access-secret: ${TUYA_ACCESS_SECRET:}

# Integracao PIX via Asaas (menu Faturamento). Preencha via variaveis de ambiente.
# Enquanto enabled=false o sistema opera em modo mock (PIX simulado + botao "Simular pagamento").
# Sandbox: ASAAS_BASE_URL=https://api-sandbox.asaas.com/v3 | Producao: https://api.asaas.com/v3
asaas:
  enabled: ${ASAAS_ENABLED:false}
  base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
  api-key: ${ASAAS_API_KEY:}
  webhook-token: ${ASAAS_WEBHOOK_TOKEN:}
  # Multa (uma vez apos o vencimento) e juros de mora (ao mes), em %. As taxas de
  # PIX/cartao repassadas ao cliente NAO ficam aqui: vem do simulador do Asaas.
  multa-percent: ${ASAAS_MULTA:1}
  juros-percent: ${ASAAS_JUROS:1}
