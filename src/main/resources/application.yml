spring:
  application:
    name: rancho-gestao-api
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api

api:
  security:
    jwt:
      token-prefix: "Bearer "
      header: "Authorization"

# Integracao com interruptores WiFi via Tuya Cloud (menu Dispositivos).
# Preencha via variaveis de ambiente. Enquanto enabled=false o menu mostra apenas o aviso de configuracao.
tuya:
  enabled: ${TUYA_ENABLED:false}
  endpoint: ${TUYA_ENDPOINT:https://openapi.tuyaus.com}
  access-id: ${TUYA_ACCESS_ID:}
  access-secret: ${TUYA_ACCESS_SECRET:}
